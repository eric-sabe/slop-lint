name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Unit tests
        run: node --test
      - name: Dogfood (our own prose must pass)
        run: node slop-lint.mjs README.md
